name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ISOs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            qemu-utils \
            mtools \
            dosfstools \
            e2fsprogs \
            make \
            git \
            curl \
            ca-certificates \
            gcc \
            clang \
            lld \
            nasm

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src
          targets: x86_64-unknown-none

      - name: Add bare-metal target
        run: |
          TOOLCHAIN="$(rustup show active-toolchain | awk '{print $1}')"
          rustup target add x86_64-unknown-none --toolchain "$TOOLCHAIN"

      - name: Build ISO (FAT32)
        run: |
          make
          mv -f micros64.iso micros64-fat32.iso
          make create-disk FS=fat32 DISK=disk-fat32.img
          make setup-disk  FS=fat32 DISK=disk-fat32.img

      - name: Build ISO (ext2)
        run: |
          make
          mv -f micros64.iso micros64-ext2.iso
          make create-disk FS=ext2 DISK=disk-ext2.img
          make setup-disk  FS=ext2 DISK=disk-ext2.img

      - name: Upload ISO FAT32 artifact
        uses: actions/upload-artifact@v4
        with:
          name: micros64-fat32
          path: |
            micros64-fat32.iso
            disk-fat32.img

      - name: Upload ISO ext2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: micros64-ext2
          path: |
            micros64-ext2.iso
            disk-ext2.img
